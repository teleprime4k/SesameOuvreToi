<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaSify Dashboard</title>
    </head>
<body class="bg-dark-950 text-slate-100 font-sans">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // Configuration Firebase fournie
        const firebaseConfig = {
            apiKey: "AIzaSyBs4p7kaG0d6GMuMRiThl1W7_ZTncLCBCo",
            authDomain: "sesameouvretoi-13.firebaseapp.com",
            projectId: "sesameouvretoi-13",
            storageBucket: "sesameouvretoi-13.firebasestorage.app",
            messagingSenderId: "167364948430",
            appId: "1:167364948430:web:e1874c21b6d39fd412bb9f",
            measurementId: "G-VRWJPSC723"
        };

        // Initialisation de Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- VARIABLES D'ÉTAT GLOBALES ---
        let currentUser = null;
        let users = {}; // Cache local synchronisé avec Firebase pour l'admin
        let simulatedDate = new Date();
        let currentFilter = 'all';
        let selectedPaymentServiceId = 'srv-mensuel'; // valeur par défaut supposée
        let serviceUnderTransaction = null;
        let serviceUnderDevisRequest = null;
        let activeAdminChatUserEmail = null;

        // Données statiques des services (À adapter selon ton bloc 1 & 2)
        const AVAILABLE_SERVICES = [
            { id: 'srv-mensuel', name: 'Offre Mensuelle', type: 'mensuel', price: 29.00, icon: 'layers', color: 'bg-blue-500/10 text-blue-400', description: 'Accès complet aux outils de base.', paymentUrl: 'https://checkout.stripe.com/...' },
            { id: 'srv-annuel', name: 'Offre Annuelle', type: 'annuel', price: 249.00, icon: 'zap', color: 'bg-amber-500/10 text-amber-400', description: 'Économisez 2 mois. Support prioritaire.', paymentUrl: 'https://checkout.stripe.com/...' },
            { id: 'srv-devis', name: 'Projet Sur-Mesure', type: 'devis', price: null, icon: 'settings', color: 'bg-purple-500/10 text-purple-400', description: 'Développement spécifique et intégration dédiée.', paymentUrl: null }
        ];

        // --- FONCTIONS UTILITAIRES DE SYNCHRONISATION FIREBASE ---
        
        // Firebase n'accepte pas les points (.) dans les clés de chemin. 
        // Cette fonction encode l'email (ex: test@gmail.com -> test@gmail_com)
        function encodeEmail(email) {
            return email.replace(/\./g, '_');
        }

        // Charger tous les utilisateurs (Utile pour la console admin)
        async function loadAllUsers() {
            const dbRef = ref(db);
            try {
                const snapshot = await get(child(dbRef, 'users'));
                if (snapshot.exists()) {
                    users = snapshot.val();
                } else {
                    users = {};
                }
            } catch (error) {
                console.error("Erreur Firebase lors du chargement des utilisateurs:", error);
            }
        }

        // Sauvegarder un utilisateur spécifique dans Firebase
        async function saveUserToFirebase(user) {
            const safeEmail = encodeEmail(user.email);
            try {
                await set(ref(db, 'users/' + safeEmail), user);
                // Si l'utilisateur modifié est la session actuelle, on met à jour l'état local
                if (currentUser && currentUser.email === user.email) {
                    currentUser = user;
                    sessionStorage.setItem('saasify_session', JSON.stringify(currentUser));
                }
                await loadAllUsers(); // Rafraîchir le cache global
            } catch (error) {
                showNotification("Erreur de synchronisation avec la base de données.", "error");
            }
        }

        // Initialisation de la session au chargement
        async function initSession() {
            const cachedSession = sessionStorage.getItem('saasify_session');
            if (cachedSession) {
                const localUser = JSON.parse(cachedSession);
                const safeEmail = encodeEmail(localUser.email);
                const snapshot = await get(ref(db, 'users/' + safeEmail));
                if (snapshot.exists()) {
                    currentUser = snapshot.val();
                    sessionStorage.setItem('saasify_session', JSON.stringify(currentUser));
                }
            }
            await loadAllUsers();
            if (currentUser) {
                switchView('dashboard');
                updateDashboard();
            }
        }

        // --- AUTHENTIFICATION ---
        async function handleRegisterSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim().toLowerCase();
            const password = document.getElementById('register-password').value;

            const safeEmail = encodeEmail(email);
            const dbRef = ref(db);
            
            // Vérification existence
            const snapshot = await get(child(dbRef, `users/${safeEmail}`));
            if (snapshot.exists()) {
                showNotification("Un compte avec cet email existe déjà.", "error");
                return;
            }

            const newUser = {
                name: name,
                email: email,
                password: password,
                isAdmin: false, 
                services: {}, 
                paymentHistory: [],
                messages: [
                    { sender: 'admin', text: `Bonjour ${name} ! Bienvenue sur SaaSify. N'hésitez pas à nous envoyer un message ici si vous avez des questions sur nos abonnements ou vos devis.`, date: new Date().toISOString() }
                ]
            };

            await saveUserToFirebase(newUser);
            currentUser = newUser;
            sessionStorage.setItem('saasify_session', JSON.stringify(currentUser));

            showNotification(`Bienvenue, votre compte a bien été créé !`, 'success');
            switchView('dashboard');
            updateDashboard();
            document.getElementById('register-form').reset();
        }

        async function handleLoginSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value;

            const safeEmail = encodeEmail(email);
            const snapshot = await get(ref(db, `users/${safeEmail}`));

            if (!snapshot.exists() || snapshot.val().password !== password) {
                showNotification("Email ou mot de passe incorrect.", "error");
                return;
            }

            const user = snapshot.val();
            currentUser = user;

            if (!currentUser.messages) {
                currentUser.messages = [
                    { sender: 'admin', text: "Bonjour ! Bienvenue sur SaaSify. N'hésitez pas à nous envoyer un message ici si vous avez des questions.", date: new Date().toISOString() }
                ];
                await saveUserToFirebase(currentUser);
            }

            sessionStorage.setItem('saasify_session', JSON.stringify(currentUser));
            showNotification(`Heureux de vous revoir, ${user.name} ! ${user.isAdmin ? '👑 Mode Administrateur activé.' : ''}`, 'success');
            switchView('dashboard');
            updateDashboard();
            document.getElementById('login-form').reset();
        }

        function handleLogout() {
            currentUser = null;
            activeAdminChatUserEmail = null;
            sessionStorage.removeItem('saasify_session');
            showNotification("Vous avez été déconnecté.", "info");
            switchView('home');
        }

        // --- GESTION DU TEMPS DE SIMULATION ---
        function changeSimulationDate(val) {
            simulatedDate = new Date(val);
            showNotification(`Date virtuelle modifiée : ${simulatedDate.toLocaleDateString('fr-FR')}`, 'info');
            updateDashboard();
        }

        function resetSimulationDate() {
            simulatedDate = new Date();
            const dateInput = document.getElementById('simulated-date');
            if(dateInput) dateInput.value = simulatedDate.toISOString().split('T')[0];
            showNotification("Date réinitialisée au jour actuel.", "info");
            updateDashboard();
        }

        // --- LOGIQUE ABONNEMENT ET CALCULS DE TEMPS ---
        function checkCoverage(userService) {
            if (!userService || !userService.expiryDate) {
                return { covered: false, remainingDays: 0 };
            }

            const expiry = new Date(userService.expiryDate);
            const timeDiff = expiry.getTime() - simulatedDate.getTime();
            const remainingDays = Math.ceil(timeDiff / (1000 * 3600 * 24));

            return {
                covered: remainingDays > 0,
                remainingDays: Math.max(0, remainingDays)
            };
        }

        function filterServices(category) {
            currentFilter = category;
            ['all', 'mensuel', 'annuel', 'devis'].forEach(cat => {
                const btn = document.getElementById(`filter-${cat}`);
                if (!btn) return;
                if (cat === category) {
                    btn.className = "text-xs font-semibold px-2.5 py-1.5 rounded-md bg-brand-500 text-white shadow-sm transition-all";
                } else {
                    btn.className = "text-xs font-medium px-2.5 py-1.5 text-slate-400 rounded-md hover:bg-slate-800 hover:text-white transition-all";
                }
            });
            renderServices();
        }

        // --- ACTIONS SUR LES SERVICES ---
        async function toggleService(serviceId) {
            if (!currentUser) return;

            const service = AVAILABLE_SERVICES.find(s => s.id === serviceId);
            if (!service) return;

            if (!currentUser.services) currentUser.services = {};
            const userService = currentUser.services[serviceId];

            // DÉSACTIVER
            if (userService && userService.status === 'active') {
                userService.status = 'inactive';
                showNotification(`Le service "${service.name}" a été désactivé.`, 'warning');
                await saveUserToFirebase(currentUser);
                updateDashboard();
                return;
            }

            // CAS SERVICE SUR DEVIS
            if (service.type === 'devis') {
                if (!userService || (!userService.status && !userService.hasPaidOnce)) {
                    openDevisRequestModal(service);
                    return;
                }
                if (userService.status === 'devis_demande') {
                    showNotification("Votre demande est en cours d'analyse. Attribuez un tarif via la console admin.", "warning");
                    return;
                }
                if (userService.status === 'devis_propose') {
                    await payDevis(service.id, userService.devisAmount);
                    return;
                }
            }

            // ACTIVATION CLASSIQUE
            if (!userService || !userService.hasPaidOnce) {
                await simulateDirectActivation(service);
                if (service.paymentUrl) window.open(service.paymentUrl, '_blank');
                return;
            }

            const coverage = checkCoverage(userService);
            if (coverage.covered) {
                userService.status = 'active';
                const freeTransaction = {
                    id: 'TX-' + Math.floor(100000 + Math.random() * 900000),
                    serviceId: service.id,
                    serviceName: service.name,
                    amount: 0.00,
                    date: simulatedDate.toISOString(),
                    type: service.type,
                    mode: 'Réactivation gratuite (période en cours)'
                };
                if (!currentUser.paymentHistory) currentUser.paymentHistory = [];
                currentUser.paymentHistory.unshift(freeTransaction);
                showNotification(`Réactivation gratuite pour "${service.name}" (reste ${coverage.remainingDays} jours).`, 'success');
                await saveUserToFirebase(currentUser);
                updateDashboard();
            } else {
                showNotification("Votre couverture précédente est expirée. Redirection paiement.", "info");
                await simulateDirectActivation(service);
                if (service.paymentUrl) window.open(service.paymentUrl, '_blank');
            }
        }

        async function simulateDirectActivation(service, customPrice = null) {
            const price = customPrice !== null ? customPrice : service.price;
            const nowStr = simulatedDate.toISOString();
            const expiry = new Date(simulatedDate);

            if (service.type === 'mensuel') {
                expiry.setDate(expiry.getDate() + 30);
            } else {
                expiry.setFullYear(expiry.getFullYear() + 1);
            }

            if (!currentUser.services) currentUser.services = {};
            currentUser.services[service.id] = {
                status: 'active',
                lastPaymentDate: nowStr,
                expiryDate: expiry.toISOString(),
                hasPaidOnce: true
            };

            const transaction = {
                id: 'TX-' + Math.floor(100000 + Math.random() * 900000),
                serviceId: service.id,
                serviceName: service.name,
                amount: price,
                date: nowStr,
                type: service.type,
                mode: 'Règlement direct (Bouton Rapide)'
            };

            if (!currentUser.paymentHistory) currentUser.paymentHistory = [];
            currentUser.paymentHistory.unshift(transaction);

            await saveUserToFirebase(currentUser);
            updateDashboard();
            showNotification(`Service "${service.name}" activé lors du traitement de votre règlement !`, 'success');
        }

        // --- DEVIS ---
        async function handleDevisRequestSubmit(e) {
            e.preventDefault();
            if (!serviceUnderDevisRequest || !currentUser) return;

            const service = serviceUnderDevisRequest;
            const clientNotes = document.getElementById('devis-client-notes').value.trim();

            if (!currentUser.services) currentUser.services = {};
            currentUser.services[service.id] = {
                status: 'devis_demande',
                clientNotes: clientNotes,
                hasPaidOnce: false,
                devisDate: simulatedDate.toISOString()
            };

            if (!currentUser.messages) currentUser.messages = [];
            currentUser.messages.push({
                sender: 'client',
                text: `[Système] J'ai soumis une demande de devis pour le service "${service.name}". Description : "${clientNotes}"`,
                date: simulatedDate.toISOString()
            });

            await saveUserToFirebase(currentUser);
            showNotification(`Votre demande de devis pour "${service.name}" a été transmise !`, 'success');
            closeDevisRequestModal();
            updateDashboard();
        }

        async function sendDevisPriceFromAdmin(clientEmail, serviceId) {
            const cleanEmailKey = clientEmail.replace(/[@.]/g, '_');
            const inputId = `admin-price-input-${cleanEmailKey}-${serviceId}`;
            const priceInput = document.getElementById(inputId);
            const price = parseFloat(priceInput.value);

            if (isNaN(price) || price <= 0) {
                showNotification("Veuillez saisir un tarif valide supérieur à 0 €.", "error");
                return;
            }

            const targetUser = users[encodeEmail(clientEmail)];
            if (!targetUser || !targetUser.services[serviceId]) return;

            targetUser.services[serviceId].status = 'devis_propose';
            targetUser.services[serviceId].devisAmount = price;
            targetUser.services[serviceId].devisDate = simulatedDate.toISOString();

            const srvName = AVAILABLE_SERVICES.find(s => s.id === serviceId).name;
            if (!targetUser.messages) targetUser.messages = [];
            targetUser.messages.push({
                sender: 'admin',
                text: `[Système - Devis Rempli] Nous avons évalué votre besoin pour "${srvName}". Le tarif est fixé à ${price.toFixed(2)} € / an. Vous pouvez l'accepter directement depuis votre catalogue !`,
                date: simulatedDate.toISOString()
            });

            await saveUserToFirebase(targetUser);
            showNotification(`Le prix du devis pour "${srvName}" a été fixé à ${price.toFixed(2)} € !`, 'success');
            updateDashboard();
        }

        async function payDevis(serviceId, devisPrice) {
            const service = AVAILABLE_SERVICES.find(s => s.id === serviceId);
            if (!service) return;

            const nowStr = simulatedDate.toISOString();
            const expiry = new Date(simulatedDate);
            expiry.setFullYear(expiry.getFullYear() + 1);

            currentUser.services[serviceId] = {
                status: 'active',
                lastPaymentDate: nowStr,
                expiryDate: expiry.toISOString(),
                hasPaidOnce: true,
                devisAmount: devisPrice,
                clientNotes: currentUser.services[serviceId].clientNotes
            };

            const transaction = {
                id: 'TX-' + Math.floor(100000 + Math.random() * 900000),
                serviceId: serviceId,
                serviceName: service.name,
                amount: devisPrice,
                date: nowStr,
                type: 'devis',
                mode: 'Validation & Paiement de Devis'
            };

            if (!currentUser.paymentHistory) currentUser.paymentHistory = [];
            currentUser.paymentHistory.unshift(transaction);

            await saveUserToFirebase(currentUser);
            showNotification(`Le devis pour "${service.name}" a été réglé avec succès !`, 'success');
            updateDashboard();
        }

        // --- SYSTEM DE MESSAGERIE (SUPPORT CHAT) ---
        async function handleClientSendMessage(e) {
            e.preventDefault();
            if (!currentUser) return;

            const input = document.getElementById('client-chat-input');
            const messageText = input.value.trim();

            if (!messageText) return;
            if (!currentUser.messages) currentUser.messages = [];

            currentUser.messages.push({
                sender: 'client',
                text: messageText,
                date: simulatedDate.toISOString()
            });

            await saveUserToFirebase(currentUser);
            input.value = "";
            showNotification("Message envoyé au support !", "success");
            updateDashboard();
        }

        async function handleAdminSendMessage(e) {
            e.preventDefault();
            if (!currentUser || !currentUser.isAdmin || !activeAdminChatUserEmail) return;

            const input = document.getElementById('admin-chat-input');
            const messageText = input.value.trim();

            if (!messageText) return;

            const targetClient = users[encodeEmail(activeAdminChatUserEmail)];
            if (!targetClient) return;

            if (!targetClient.messages) targetClient.messages = [];
            targetClient.messages.push({
                sender: 'admin',
                text: messageText,
                date: simulatedDate.toISOString()
            });

            await saveUserToFirebase(targetClient);
            input.value = "";
            showNotification(`Message de réponse envoyé à ${targetClient.name} !`, "success");
            updateDashboard();
        }

        function selectAdminActiveChat(clientEmail) {
            activeAdminChatUserEmail = clientEmail;
            renderAdminChat();
        }

        // --- DESSIN DES COMPOSANTS (RENDU DYNAMIQUE) ---
        function renderClientChat() {
            const container = document.getElementById('client-chat-messages');
            if(!container) return;
            container.innerHTML = "";

            if (!currentUser) return;
            const chatHistory = currentUser.messages || [];

            if (chatHistory.length === 0) {
                container.innerHTML = `<p class="text-slate-500 italic text-center py-4 text-[10px]">Aucun message.</p>`;
                return;
            }

            chatHistory.forEach(msg => {
                const isSystem = msg.text.startsWith('[Système');
                const isClient = msg.sender === 'client';
                
                const bubbleWrapper = document.createElement('div');
                bubbleWrapper.className = `flex flex-col ${isSystem ? 'items-center my-3' : (isClient ? 'items-end' : 'items-start')}`;

                let bubbleClass = "max-w-[85%] rounded-xl px-3 py-2 text-[11px] leading-relaxed shadow-sm ";
                if (isSystem) {
                    bubbleClass += "bg-[#111827] text-slate-500 border border-slate-800 text-center text-[10px] italic py-1 px-2";
                } else if (isClient) {
                    bubbleClass += "bg-brand-500 text-white rounded-br-none";
                } else {
                    bubbleClass += "bg-slate-800 text-slate-200 rounded-bl-none border border-slate-750";
                }

                const msgDate = new Date(msg.date);
                const timeStr = msgDate.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

                bubbleWrapper.innerHTML = `
                    <div class="${bubbleClass}">
                        <p>${msg.text}</p>
                    </div>
                    ${!isSystem ? `<span class="text-[9px] text-slate-500 mt-0.5 px-1">${timeStr}</span>` : ''}
                `;
                container.appendChild(bubbleWrapper);
            });
            container.scrollTop = container.scrollHeight;
        }

        function renderAdminChat() {
            const listUsersContainer = document.getElementById('admin-chat-users');
            const messagesContainer = document.getElementById('admin-chat-messages');
            const chatHeader = document.getElementById('admin-chat-header');
            const chatForm = document.getElementById('admin-chat-form');

            if(!listUsersContainer || !messagesContainer) return;
            listUsersContainer.innerHTML = "";

            if (!currentUser || !currentUser.isAdmin) return;

            const chatClients = Object.values(users).filter(u => u.email !== currentUser.email);

            if (chatClients.length === 0) {
                listUsersContainer.innerHTML = `<p class="text-slate-500 text-sm italic text-center py-4">Aucun client.</p>`;
                return;
            }

            chatClients.forEach(user => {
                const isSelected = activeAdminChatUserEmail === user.email;
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-2 rounded-xl text-xs transition-all flex flex-col gap-0.5 border ${isSelected ? 'bg-brand-500/20 text-brand-200 border-brand-500/30' : 'bg-[#090d16] text-slate-400 border-slate-800 hover:bg-slate-850'}`;
                btn.onclick = () => selectAdminActiveChat(user.email);

                btn.innerHTML = `
                    <div class="flex justify-between items-center w-full gap-2">
                        <span class="font-bold truncate flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981] animate-pulse flex-shrink-0"></span>
                            <span class="truncate">${user.name}</span>
                        </span>
                    </div>
                    <span class="text-[9px] text-slate-500 truncate w-full">${user.email}</span>
                `;
                listUsersContainer.appendChild(btn);
            });

            if (!activeAdminChatUserEmail) {
                messagesContainer.innerHTML = `<p class="text-slate-600 text-center italic mt-12">Sélectionnez un client.</p>`;
                if(chatHeader) chatHeader.textContent = "Aucun tchat actif";
                if(chatForm) chatForm.classList.add('hidden');
                return;
            }

            const activeClient = users[encodeEmail(activeAdminChatUserEmail)];
            if (!activeClient) return;

            if(chatHeader) chatHeader.innerHTML = `Discussion avec <strong class="text-white">${activeClient.name}</strong>`;
            if(chatForm) chatForm.classList.remove('hidden');

            messagesContainer.innerHTML = "";
            const activeHistory = activeClient.messages || [];

            activeHistory.forEach(msg => {
                const isSystem = msg.text.startsWith('[Système');
                const isClient = msg.sender === 'client';

                const bubbleWrapper = document.createElement('div');
                bubbleWrapper.className = `flex flex-col ${isSystem ? 'items-center my-2' : (isClient ? 'items-start' : 'items-end')}`;

                let bubbleClass = "max-w-[85%] rounded-lg px-2.5 py-1.5 text-[10px] leading-relaxed ";
                if (isSystem) {
                    bubbleClass += "bg-[#111827] text-slate-500 border border-slate-800 text-center italic text-[9px] py-1 px-2";
                } else if (isClient) {
                    bubbleClass += "bg-slate-800 text-slate-200 border border-slate-700 rounded-bl-none";
                } else {
                    bubbleClass += "bg-brand-500 text-white font-medium rounded-br-none";
                }

                const msgDate = new Date(msg.date);
                const timeStr = msgDate.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

                bubbleWrapper.innerHTML = `
                    <div class="${bubbleClass}">
                        <p>${msg.text}</p>
                    </div>
                    ${!isSystem ? `<span class="text-[8px] text-slate-500 mt-0.5 px-1">${timeStr}</span>` : ''}
                `;
                messagesContainer.appendChild(bubbleWrapper);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function renderServices() {
            const listContainer = document.getElementById('services-list');
            if(!listContainer) return;
            listContainer.innerHTML = '';

            const filtered = AVAILABLE_SERVICES.filter(s => {
                if (currentFilter === 'all') return true;
                return s.type === currentFilter;
            });

            filtered.forEach(service => {
                const userService = (currentUser && currentUser.services) ? currentUser.services[service.id] : null;
                const isActive = userService && userService.status === 'active';
                const coverage = checkCoverage(userService);
                
                let statusBadge = '';
                let actionBtnText = 'Activer';
                let actionBtnClass = 'bg-brand-500 text-white';
                let infoText = '';
                let priceDisplay = `<span class="text-xl font-black text-white">${service.price ? service.price.toFixed(2) + ' €' : 'Sur Devis'}</span>`;

                if (service.type === 'devis' && userService) {
                    if (userService.status === 'devis_propose') {
                        actionBtnText = `Régler (${userService.devisAmount.toFixed(2)} €)`;
                        actionBtnClass = "bg-emerald-600 text-white font-bold";
                        statusBadge = `<span class="px-2 py-0.5 rounded-full text-[10px] bg-amber-500/15 text-amber-400">Offre proposée</span>`;
                        priceDisplay = `<span class="text-xl font-black text-white">${userService.devisAmount.toFixed(2)} €</span>`;
                    } else if (userService.status === 'active') {
                        statusBadge = `<span class="px-2 py-0.5 rounded-full text-[10px] bg-emerald-500/15 text-emerald-400">Actif</span>`;
                        actionBtnText = "Désactiver";
                        actionBtnClass = "bg-rose-500/10 text-rose-400";
                    } else {
                        statusBadge = `<span class="px-2 py-0.5 rounded-full text-[10px] bg-indigo-500/15 text-indigo-400">Étude en cours</span>`;
                        actionBtnText = "Analyse...";
                        actionBtnClass = "bg-slate-800 text-slate-500 cursor-not-allowed";
                    }
                } else if (isActive) {
                    statusBadge = `<span class="text-[9px] text-emerald-400">● Actif</span>`;
                    actionBtnText = 'Désactiver';
                    actionBtnClass = 'bg-rose-950/40 text-rose-400';
                    infoText = `Expire le ${new Date(userService.expiryDate).toLocaleDateString('fr-FR')}`;
                }

                const card = document.createElement('div');
                card.className = `bg-dark-900 rounded-2xl border p-5 transition-all flex flex-col justify-between ${isActive ? 'border-brand-500' : 'border-slate-850'}`;
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-3">
                            <div class="w-9 h-9 rounded-xl ${service.color} flex items-center justify-center">
                                <i data-lucide="${service.icon}" class="w-4.5 h-4.5"></i>
                            </div>
                            ${statusBadge}
                        </div>
                        <h4 class="text-sm font-bold text-white">${service.name}</h4>
                        <p class="text-[11px] text-slate-400 mt-1">${service.description}</p>
                        <div class="mt-3">${priceDisplay}</div>
                    </div>
                    <div class="mt-4 pt-3 border-t border-slate-850">
                        <div class="text-[10px] text-slate-500 mb-2">${infoText}</div>
                        <button onclick="toggleService('${service.id}')" class="w-full py-1.5 px-3 rounded-xl font-bold text-xs transition-all ${actionBtnClass}">${actionBtnText}</button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
            if(window.lucide) lucide.createIcons();
        }

        function renderAdminConsole() {
            const adminContainer = document.getElementById('admin-devis-list');
            if(!adminContainer) return;
            adminContainer.innerHTML = '';

            if (!currentUser || !currentUser.isAdmin) return;

            let hasPendingRequests = false;

            Object.values(users).forEach(user => {
                if (user.services) {
                    AVAILABLE_SERVICES.forEach(service => {
                        if (service.type === 'devis') {
                            const userService = user.services[service.id];
                            if (userService && userService.status === 'devis_demande') {
                                hasPendingRequests = true;
                                const cleanEmailKey = user.email.replace(/[@.]/g, '_');
                                const inputIdSafe = `admin-price-input-${cleanEmailKey}-${service.id}`;

                                const item = document.createElement('div');
                                item.className = "p-4 bg-[#111827] rounded-xl border border-slate-800 space-y-3";
                                item.innerHTML = `
                                    <div class="flex justify-between pb-2 border-b border-slate-850">
                                        <div><h4 class="text-xs font-bold text-white">${service.name}</h4></div>
                                        <div class="text-[10px] text-slate-400">Client : ${user.name} (${user.email})</div>
                                    </div>
                                    <p class="text-xs text-slate-300 italic">"${userService.clientNotes}"</p>
                                    <div class="flex justify-between items-center gap-2">
                                        <input type="number" id="${inputIdSafe}" placeholder="Ex: 1500" class="bg-[#090d16] border border-slate-850 rounded-lg px-2 py-1 text-xs text-white">
                                        <button onclick="sendDevisPriceFromAdmin('${user.email}', '${service.id}')" class="px-3 py-1 bg-amber-500 text-slate-950 font-bold text-[10px] rounded-lg">Valider</button>
                                    </div>
                                `;
                                adminContainer.appendChild(item);
                            }
                        }
                    });
                }
            });

            if (!hasPendingRequests) {
                adminContainer.innerHTML = `<div class="text-center py-6 text-slate-600 text-xs italic border border-dashed border-slate-800 rounded-xl">Aucun devis en attente.</div>`;
            }
        }

        function renderPaymentHistory() {
            const listContainer = document.getElementById('payments-history-list');
            if(!listContainer) return;
            listContainer.innerHTML = '';

            const history = currentUser ? currentUser.paymentHistory : [];
            if (!history || history.length === 0) {
                listContainer.innerHTML = `<p class="text-slate-550 text-xs italic text-center py-4">Aucune transaction.</p>`;
                return;
            }

            history.forEach(tx => {
                const dateFormatted = new Date(tx.date).toLocaleDateString('fr-FR');
                const item = document.createElement('div');
                item.className = "flex items-center justify-between p-2 bg-dark-950 rounded-lg border border-slate-850";
                item.innerHTML = `
                    <div>
                        <p class="text-xs font-bold text-white">${tx.serviceName}</p>
                        <p class="text-[9px] text-slate-500">${dateFormatted} • ${tx.mode || 'Règlement'}</p>
                    </div>
                    <div><p class="text-xs font-extrabold">${tx.amount === 0 ? 'Gratuit' : `-${tx.amount.toFixed(2)} €`}</p></div>
                `;
                listContainer.appendChild(item);
            });
        }

        async function clearPaymentHistory() {
            if (!currentUser || !currentUser.paymentHistory) return;
            
            const oneYearAgo = new Date(simulatedDate);
            oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);

            currentUser.paymentHistory = currentUser.paymentHistory.filter(tx => new Date(tx.date) >= oneYearAgo);
            
            await saveUserToFirebase(currentUser);
            showNotification("Historique des transactions nettoyé (supérieur à 1 an).", "success");
            updateDashboard();
        }

        // --- MISE À JOUR GLOBAL DU DASHBOARD ---
        function updateDashboard() {
            if (!currentUser) return;

            const userNameEl = document.getElementById('dashboard-user-name');
            if(userNameEl) userNameEl.textContent = currentUser.name;

            let activeCount = 0;
            let cancelledCount = 0;
            let monthlyEst = 0;
            let annualEst = 0;
            let devisEst = 0;

            AVAILABLE_SERVICES.forEach(service => {
                const userSrv = currentUser.services ? currentUser.services[service.id] : null;
                const coverage = checkCoverage(userSrv);

                if (userSrv && userSrv.status === 'active' && (service.type === 'devis' ? true : coverage.covered)) {
                    activeCount++;
                    if (service.type === 'mensuel') monthlyEst += service.price;
                    if (service.type === 'annuel') annualEst += service.price;
                    if (service.type === 'devis' && userSrv.devisAmount) devisEst += userSrv.devisAmount;
                } else if (userSrv) {
                    cancelledCount++;
                }
            });

            // Injection des statistiques (si les éléments existent dans le DOM)
            if(document.getElementById('stat-active-count')) document.getElementById('stat-active-count').textContent = activeCount;
            if(document.getElementById('stat-total-cost')) document.getElementById('stat-total-cost').textContent = `${monthlyEst.toFixed(2)} €`;
            if(document.getElementById('stat-annual-cost')) document.getElementById('stat-annual-cost').textContent = `${annualEst.toFixed(2)} €`;
            if(document.getElementById('stat-devis-cost')) document.getElementById('stat-devis-cost').textContent = `${devisEst.toFixed(2)} €`;
            if(document.getElementById('stat-cancelled-count')) document.getElementById('stat-cancelled-count').textContent = cancelledCount;

            renderServices();
            renderClientChat();
            renderAdminChat();
            renderAdminConsole();
            renderPaymentHistory();

            const adminSection = document.getElementById('admin-console-section');
            if(adminSection) adminSection.classList.toggle('hidden', !currentUser.isAdmin);
        }

        // --- LIENS AVEC L'ENVIRONNEMENT GLOBAL WINDOW ---
        // Essentiel pour que les fonctions d'action HTML `onclick` s'exécutent en type="module"
        window.handleRegisterSubmit = handleRegisterSubmit;
        window.handleLoginSubmit = handleLoginSubmit;
        window.handleLogout = handleLogout;
        window.changeSimulationDate = changeSimulationDate;
        window.resetSimulationDate = resetSimulationDate;
        window.filterServices = filterServices;
        window.toggleService = toggleService;
        window.handleDevisRequestSubmit = handleDevisRequestSubmit;
        window.sendDevisPriceFromAdmin = sendDevisPriceFromAdmin;
        window.handleClientSendMessage = handleClientSendMessage;
        window.handleAdminSendMessage = handleAdminSendMessage;
        window.clearPaymentHistory = clearPaymentHistory;

        // Démarrage de la session
        initSession();
    </script>
</body>
</html>
