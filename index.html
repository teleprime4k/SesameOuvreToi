<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sésame Ouvre-Toi - Dark Cyber Dashboard</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Personnalisation de la barre de défilement */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #020617; /* slate-950 */
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b; /* slate-800 */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #0891b2; /* cyan-600 */
        }
        
        /* Animations pour les notifications (Toast) */
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-animate {
            animation: slideInUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 font-sans overflow-hidden h-screen w-full" id="app">
    
    <!-- Conteneur Principal -->
    <div id="root" class="w-full h-full"></div>

    <!-- Conteneur de Notifications -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- LOGIQUE APPLICATIVE (JavaScript Module) -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, addDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // ==========================================
        // 1. CONFIGURATION FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBs4p7kaG0d6GMuMRiThl1W7_ZTncLCBCo",
            authDomain: "sesameouvretoi-13.firebaseapp.com",
            projectId: "sesameouvretoi-13",
            storageBucket: "sesameouvretoi-13.firebasestorage.app",
            messagingSenderId: "167364948430",
            appId: "1:167364948430:web:e1874c21b6d39fd412bb9f",
            measurementId: "G-VRWJPSC723"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "sesameouvretoi";

        // ==========================================
        // 2. DONNÉES STATIQUES
        // ==========================================
        const CATALOG_OFFERS = [
            { id: 'cyber-basic', name: 'Noyau Cyber Basic', price: 9.99, durationDays: 30, color: 'text-blue-400', border: 'border-blue-500/30', features: ['Accès Standard', 'Bande Passante 500GB', 'Support 48h'] },
            { id: 'matrix-pro', name: 'Matrice Pro', price: 29.99, durationDays: 30, color: 'text-cyan-400', border: 'border-cyan-500', popular: true, features: ['Accès Prioritaire', 'Bande Passante Illimitée', 'Support 2h', 'Clé API Sécurisée'] },
            { id: 'overload-max', name: 'Surcharge Éternelle', price: 299.99, durationDays: 365, color: 'text-purple-400', border: 'border-purple-500/50', features: ['Accès Permanent (1 an)', 'Ressources Quantiques', 'Ligne Directe Admin', 'SLA 99.99%'] },
        ];

        const TABS = [
            { id: 'dashboard', label: 'Télémétrie', icon: 'activity' },
            { id: 'catalog', label: 'Modules', icon: 'shopping-cart' },
            { id: 'quotes', label: 'Devis Sur-Mesure', icon: 'database' },
            { id: 'history', label: 'Archives', icon: 'history' },
            { id: 'chat', label: 'Canal Support', icon: 'message-square' },
            { id: 'simulator', label: 'Simulateur Temps', icon: 'clock' },
        ];

        // ==========================================
        // 3. GESTION D'ÉTAT GLOBAL
        // ==========================================
        window.appState = {
            user: null,
            isAdmin: false,          
            simulateAdmin: false,    
            loadingAuth: true,
            isLoginMode: true,
            authLoading: false,
            authError: '',
            activeTab: 'dashboard',
            profile: null,
            catalogFilter: 'all',
            quotes: { nodes: 10, storage: 500, sla: 'standard' },
            adminSelectedClient: null,
            allProfiles: [],
            allQuotes: [],
            allMessages: [],
            firestoreBlocked: false // Détecteur intelligent de blocage de permissions
        };

        let unsubProfile = null;
        let unsubHistory = null;
        let unsubChat = null;
        
        let unsubAdminProfiles = null;
        let unsubAdminQuotes = null;
        let unsubAdminMessages = null;

        // Fonction de Notification Toast
        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-red-950 border-red-500/50 text-red-200' : 'bg-cyan-950 border-cyan-500/50 text-cyan-200';
            toast.className = `toast-animate px-4 py-3 rounded-lg shadow-[0_0_15px_rgba(0,0,0,0.5)] border font-mono text-xs uppercase tracking-wide flex items-center gap-2 ${bgColor}`;
            toast.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'check-circle'}" class="w-4 h-4"></i> ${msg}`;
            
            container.appendChild(toast);
            lucide.createIcons({ root: toast });
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        };

        // Gérer de façon globale l'erreur de permissions
        function handlePermissionError(err) {
            if (err && (err.code === 'permission-denied' || err.message.includes('permission'))) {
                window.appState.firestoreBlocked = true;
                renderApp();
            }
        }

        // ==========================================
        // 4. INITIALISATION & LISTENERS
        // ==========================================
        onAuthStateChanged(auth, async (currentUser) => {
            window.appState.user = currentUser;
            window.appState.firestoreBlocked = false; // Réinitialiser au changement d'état
            
            if (currentUser) {
                window.appState.isAdmin = currentUser.email.toLowerCase().includes('admin');
                
                try {
                    const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', currentUser.uid);
                    const snap = await getDoc(profileRef);
                    
                    if (!snap.exists()) {
                        await setDoc(profileRef, {
                            email: currentUser.email,
                            status: 'inactive',
                            subEnd: null,
                            usageTotal: 0,
                            createdAt: Date.now()
                        });
                    }

                    if(unsubProfile) unsubProfile();
                    unsubProfile = onSnapshot(profileRef, (docSnap) => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            if (data.subEnd && data.subEnd < Date.now() && data.status === 'active') {
                                updateDoc(profileRef, { status: 'expired' }).catch(handlePermissionError);
                            } else {
                                window.appState.profile = data;
                                if(['dashboard', 'simulator'].includes(window.appState.activeTab)) renderActiveTab();
                            }
                        }
                    }, (err) => {
                        console.error("Erreur de synchronisation du profil:", err);
                        handlePermissionError(err);
                    });

                    setupAdminListeners();
                } catch (err) {
                    console.error("Erreur lors de l'accès initial Firestore:", err);
                    handlePermissionError(err);
                }

            } else {
                if(unsubProfile) unsubProfile();
                teardownAdminListeners();
                window.appState.profile = null;
                window.appState.isAdmin = false;
                window.appState.simulateAdmin = false;
            }
            
            window.appState.loadingAuth = false;
            renderApp();
        });

        function setupAdminListeners() {
            teardownAdminListeners();

            try {
                const profilesCol = collection(db, 'artifacts', appId, 'public', 'data', 'profiles');
                unsubAdminProfiles = onSnapshot(profilesCol, (snap) => {
                    window.appState.allProfiles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (window.appState.activeTab === 'admin') renderActiveTab();
                }, err => {
                    console.log("Profils admin non accessibles (droits limités):", err);
                    handlePermissionError(err);
                });

                const quotesCol = collection(db, 'artifacts', appId, 'public', 'data', 'quotes');
                unsubAdminQuotes = onSnapshot(quotesCol, (snap) => {
                    const quotes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    quotes.sort((a,b) => b.date - a.date);
                    window.appState.allQuotes = quotes;
                    if (window.appState.activeTab === 'admin') renderActiveTab();
                }, err => {
                    console.log("Devis admin non accessibles (droits limités):", err);
                    handlePermissionError(err);
                });

                const messagesCol = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
                unsubAdminMessages = onSnapshot(messagesCol, (snap) => {
                    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    msgs.sort((a, b) => a.timestamp - b.timestamp);
                    window.appState.allMessages = msgs;
                    if (window.appState.activeTab === 'admin') renderActiveTab();
                }, err => {
                    console.log("Messages admin non accessibles (droits limités):", err);
                    handlePermissionError(err);
                });
            } catch(err) {
                handlePermissionError(err);
            }
        }

        function teardownAdminListeners() {
            if(unsubAdminProfiles) { unsubAdminProfiles(); unsubAdminProfiles = null; }
            if(unsubAdminQuotes) { unsubAdminQuotes(); unsubAdminQuotes = null; }
            if(unsubAdminMessages) { unsubAdminMessages(); unsubAdminMessages = null; }
        }

        // ==========================================
        // 5. RENDU DE L'INTERFACE UI
        // ==========================================
        function renderApp() {
            const root = document.getElementById('root');
            if(!root) return;
            
            if (window.appState.loadingAuth) {
                root.innerHTML = `<div class="min-h-screen flex items-center justify-center text-cyan-500"><i data-lucide="zap" class="animate-pulse w-12 h-12"></i></div>`;
            } else if (window.appState.firestoreBlocked) {
                // Rendu de l'écran de résolution de permissions
                root.innerHTML = getPermissionDiagnosticScreenHTML();
            } else if (!window.appState.user) {
                root.innerHTML = getAuthScreenHTML();
            } else {
                root.innerHTML = getMainDashboardHTML();
                renderActiveTab();
            }
            lucide.createIcons();
        }

        // --- ÉCRAN DIAGNOSTIC DE PERMISSIONS FIREBASE (SÉCURISÉ) ---
        window.retryFirestoreConnection = () => {
            window.appState.firestoreBlocked = false;
            window.appState.loadingAuth = true;
            renderApp();
            // Déclenche une reconnexion
            const user = auth.currentUser;
            if (user) {
                setupAdminListeners();
                setTimeout(() => {
                    window.appState.loadingAuth = false;
                    renderApp();
                }, 1000);
            } else {
                window.appState.loadingAuth = false;
                renderApp();
            }
        };

        function getPermissionDiagnosticScreenHTML() {
            return `
            <div class="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-6 font-mono relative overflow-y-auto">
              <div class="absolute inset-0 pointer-events-none bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-red-900/10 via-slate-950 to-slate-950"></div>
              
              <div class="z-10 w-full max-w-2xl bg-slate-900/90 backdrop-blur-xl p-8 rounded-2xl border border-red-500/40 shadow-[0_0_40px_rgba(239,68,68,0.15)] relative overflow-hidden my-8">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-red-500 to-transparent"></div>
                
                <div class="flex items-center gap-4 mb-6 border-b border-slate-800 pb-4">
                  <div class="p-3 bg-red-950/50 rounded-xl border border-red-500/50 text-red-500 animate-pulse">
                    <i data-lucide="shield-alert" class="w-8 h-8"></i>
                  </div>
                  <div>
                    <h2 class="text-xl font-bold text-white uppercase tracking-widest">Alerte Sécurité Firestore</h2>
                    <p class="text-xs text-red-400">Missing or insufficient permissions (Permission Refusée)</p>
                  </div>
                </div>

                <div class="space-y-4 text-sm text-slate-300">
                  <p>Votre application s'est connectée avec succès à votre projet Firebase, mais **Cloud Firestore bloque l'accès** en lecture/écriture car les règles de sécurité de votre base de données sont actuellement verrouillées.</p>
                  
                  <div class="p-4 bg-slate-950 rounded-lg border border-slate-800">
                    <h3 class="text-xs uppercase font-bold text-yellow-500 mb-2 flex items-center gap-2">
                      <i data-lucide="help-circle" class="w-4 h-4"></i> Comment résoudre cela en 30 secondes :
                    </h3>
                    <ol class="list-decimal list-inside space-y-2 text-xs text-slate-400">
                      <li>Rendez-vous sur votre <a href="https://console.firebase.google.com/project/sesameouvretoi-13/firestore/rules" target="_blank" class="text-cyan-400 hover:underline">Console Firebase SésameOuvreToi</a>.</li>
                      <li>Cliquez sur l'onglet <strong class="text-slate-200">Règles (Rules)</strong> à côté de l'onglet Données.</li>
                      <li>Copiez et collez le bloc de règles sécurisées ci-dessous.</li>
                      <li>Cliquez sur le bouton bleu <strong class="text-slate-200">Publier (Publish)</strong> en haut à droite.</li>
                    </ol>
                  </div>

                  <div>
                    <span class="block text-xs uppercase font-bold text-slate-400 mb-1">Code des règles à copier-coller :</span>
                    <pre class="bg-slate-950 p-4 rounded-lg border border-slate-800 text-xs text-emerald-400 overflow-x-auto font-mono">rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    // Autorise la lecture/écriture sécurisée pour les utilisateurs connectés
    match /artifacts/sesameouvretoi/public/data/{collectionName}/{documentId} {
      allow read, write: if request.auth != null;
    }
  }
}</pre>
                  </div>
                </div>

                <div class="mt-8 pt-4 border-t border-slate-800 flex flex-col sm:flex-row gap-4">
                  <button onclick="window.retryFirestoreConnection()" 
                    class="flex-1 bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 px-6 rounded-lg shadow-[0_0_15px_rgba(6,182,212,0.4)] transition-all uppercase tracking-wider text-xs flex items-center justify-center gap-2">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> J'ai publié mes règles, tester la connexion
                  </button>
                  <button onclick="window.handleLogout()" 
                    class="bg-slate-950 hover:bg-slate-800 border border-slate-800 hover:border-slate-700 text-slate-400 px-6 py-3 rounded-lg text-xs uppercase tracking-wider transition-colors">
                    Déconnexion
                  </button>
                </div>
              </div>
            </div>`;
        }

        // --- AUTHENTIFICATION ---
        window.toggleAuthMode = () => {
            window.appState.isLoginMode = !window.appState.isLoginMode;
            window.appState.authError = '';
            renderApp();
        };

        window.submitAuth = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            
            window.appState.authLoading = true;
            window.appState.authError = '';
            renderApp();

            try {
                if (window.appState.isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
            } catch (err) {
                window.appState.authError = err.message.replace('Firebase: ', '');
                window.appState.authLoading = false;
                renderApp();
            }
        };

        function getAuthScreenHTML() {
            const { isLoginMode, authLoading, authError } = window.appState;
            return `
            <div class="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-4 font-mono relative">
              <div class="absolute inset-0 overflow-hidden pointer-events-none">
                <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-cyan-900/20 blur-[100px] rounded-full"></div>
                <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-900/20 blur-[100px] rounded-full"></div>
              </div>
              
              <div class="z-10 w-full max-w-md bg-slate-900/80 backdrop-blur-xl p-8 rounded-2xl border border-slate-800 shadow-[0_0_30px_rgba(8,145,178,0.15)] relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent"></div>
                
                <div class="flex justify-center mb-8">
                  <div class="p-3 bg-slate-950 rounded-xl border border-cyan-500/30 shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                    <i data-lucide="shield" class="w-10 h-10 text-cyan-400"></i>
                  </div>
                </div>
                
                <h2 class="text-2xl font-bold text-center text-white mb-2 uppercase tracking-widest">Sésame Ouvre-Toi</h2>
                <p class="text-slate-400 text-center mb-8 text-sm">Portail d'Accès Sécurisé</p>
                
                ${authError ? `<div class="mb-4 p-3 bg-red-950/50 border border-red-500/50 rounded text-red-400 text-sm">${authError}</div>` : ''}
                
                <form onsubmit="window.submitAuth(event)" class="space-y-4">
                  <div>
                    <label class="block text-slate-400 text-xs mb-1 uppercase">Identifiant réseau</label>
                    <input id="auth-email" type="email" required
                      class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all"
                      placeholder="agent@matrix.net" />
                  </div>
                  <div>
                    <label class="block text-slate-400 text-xs mb-1 uppercase">Code d'autorisation</label>
                    <input id="auth-password" type="password" required
                      class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all"
                      placeholder="••••••••" />
                  </div>
                  
                  <button type="submit" ${authLoading ? 'disabled' : ''}
                    class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 px-4 rounded-lg shadow-[0_0_15px_rgba(8,145,178,0.5)] transition-all uppercase tracking-wider text-sm mt-4 disabled:opacity-50">
                    ${authLoading ? 'Connexion en cours...' : (isLoginMode ? 'Initialiser la liaison' : 'Créer une instance')}
                  </button>
                </form>
                
                <div class="mt-6 text-center">
                  <button type="button" onclick="window.toggleAuthMode()" class="text-cyan-500/70 hover:text-cyan-400 text-xs transition-colors">
                    ${isLoginMode ? "Créer un nouveau compte administrateur/client" : "Déjà un compte ? Établir la connexion."}
                  </button>
                </div>
              </div>
            </div>`;
        }

        // --- EN-TÊTE ET NAVIGATION DU DASHBOARD ---
        window.handleLogout = () => signOut(auth);
        
        window.toggleSimulateAdmin = () => {
            window.appState.simulateAdmin = !window.appState.simulateAdmin;
            window.showToast(window.appState.simulateAdmin ? "Console Admin activée." : "Retour au mode client standard.");
            
            if(window.appState.simulateAdmin) {
                window.appState.activeTab = 'admin';
            } else {
                window.appState.activeTab = 'dashboard';
            }
            renderApp();
        };

        window.setActiveTab = (tabId) => {
            window.appState.activeTab = tabId;
            if(unsubHistory && tabId !== 'history') { unsubHistory(); unsubHistory = null; }
            if(unsubChat && tabId !== 'chat') { unsubChat(); unsubChat = null; }
            
            renderApp();
        };

        function getMainDashboardHTML() {
            const { user, activeTab, isAdmin, simulateAdmin } = window.appState;
            const hasAdminPrivilege = isAdmin || simulateAdmin;
            
            let visibleTabs = [...TABS];
            if (hasAdminPrivilege) {
                visibleTabs = [{ id: 'admin', label: 'Console Admin', icon: 'shield' }, ...TABS];
            }

            let tabsHTML = visibleTabs.map(tab => `
                <button onclick="window.setActiveTab('${tab.id}')"
                  class="w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all text-sm font-medium ${
                    activeTab === tab.id 
                      ? 'bg-cyan-900/30 text-cyan-300 border border-cyan-500/30 shadow-[inset_0_0_15px_rgba(6,182,212,0.1)]' 
                      : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800/50'
                  }">
                  <i data-lucide="${tab.icon}" class="w-4 h-4 ${activeTab === tab.id ? 'text-cyan-400' : ''}"></i>
                  ${tab.label}
                  ${activeTab === tab.id ? '<i data-lucide="chevron-right" class="w-4 h-4 ml-auto opacity-50"></i>' : ''}
                </button>
            `).join('');

            return `
            <div class="flex h-screen bg-slate-950 text-slate-300 font-sans overflow-hidden w-full">
              <!-- Sidebar Latérale -->
              <div class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col z-20 shrink-0">
                <div class="p-6 border-b border-slate-800 flex items-center gap-3">
                  <div class="p-2 bg-slate-950 rounded border border-cyan-500/50 shadow-[0_0_10px_rgba(6,182,212,0.3)] text-cyan-400">
                    <i data-lucide="terminal" class="w-5 h-5"></i>
                  </div>
                  <div>
                    <h1 class="text-sm font-bold text-white tracking-widest uppercase">Sésame</h1>
                    <p class="text-[10px] text-cyan-500">${hasAdminPrivilege ? 'CONSOLE ROOT' : 'CLIENT LINK'}</p>
                  </div>
                </div>
                
                <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                  ${tabsHTML}
                </nav>
                
                <div class="p-4 border-t border-slate-800 space-y-4">
                  <!-- Interrupteur de Simulation Admin -->
                  <div class="bg-slate-950 p-3 rounded-lg border border-slate-800">
                    <div class="flex items-center justify-between">
                        <span class="text-[10px] uppercase font-bold text-slate-500">Simulateur Admin</span>
                        <button onclick="window.toggleSimulateAdmin()" class="relative inline-flex h-5 w-9 shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none ${simulateAdmin ? 'bg-cyan-600' : 'bg-slate-800'}">
                            <span class="pointer-events-none inline-block h-4 w-4 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out ${simulateAdmin ? 'translate-x-4' : 'translate-x-0'}"></span>
                        </button>
                    </div>
                  </div>

                  <div class="flex items-center gap-3 px-4 py-3 bg-slate-950 rounded-lg border border-slate-800 overflow-hidden">
                    <i data-lucide="user" class="w-4 h-4 text-slate-500 shrink-0"></i>
                    <div class="text-xs truncate text-slate-400">${user.email}</div>
                  </div>
                  <button onclick="window.handleLogout()" class="w-full flex items-center justify-center gap-2 px-4 py-2 text-sm text-red-400/80 hover:text-red-400 hover:bg-red-950/30 rounded-lg transition-colors border border-transparent hover:border-red-900/50">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Déconnexion
                  </button>
                </div>
              </div>

              <!-- Zone de Contenu Principale -->
              <div class="flex-1 relative overflow-y-auto overflow-x-hidden">
                <div class="absolute inset-0 pointer-events-none bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-cyan-900/10 via-slate-950 to-slate-950 z-0"></div>

        function renderActiveTab() {
            const container = document.getElementById('tab-content');
            if(!container) return;

            const { activeTab } = window.appState;
            
            if (activeTab === 'admin') renderAdminTab(container);
            else if (activeTab === 'dashboard') renderDashboardTab(container);
            else if (activeTab === 'catalog') renderCatalogTab(container);
            else if (activeTab === 'quotes') renderQuotesTab(container);
            else if (activeTab === 'history') renderHistoryTab(container);
            else if (activeTab === 'chat') renderChatTab(container);
            else if (activeTab === 'simulator') renderSimulatorTab(container);

        // 6. MODULES INDIVIDUELS DE RENDU
        // ==========================================

        // --- DASHBOARD (TÉLÉMÉTRIE) ---

        // --- CATALOGUE DE MODULES ---
        window.setCatalogFilter = (filter) => {
            window.appState.catalogFilter = filter;
            renderActiveTab();
        };

        window.handleSubscribe = async (offerId) => {
            const offer = CATALOG_OFFERS.find(o => o.id === offerId);
            if(!offer) return;
            
            const btn = document.getElementById(`btn-${offer.id}`);
            if(btn) {
                btn.disabled = true;
                btn.innerHTML = '<i data-lucide="zap" class="w-4 h-4 animate-pulse inline mr-2"></i> Traitement...';
                lucide.createIcons({ root: btn });
            }
            
            try {
                const txRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');
                await addDoc(txRef, {
                    userId: window.appState.user.uid,
                    type: 'subscription',
                    offerId: offer.id,
                    offerName: offer.name,
                    price: offer.price,
                    date: Date.now(),
                    status: 'completed'
                });

                const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', window.appState.user.uid);
                const docSnap = await getDoc(profileRef);
                let currentEnd = docSnap.exists() && docSnap.data().subEnd && docSnap.data().subEnd > Date.now() 
                                 ? docSnap.data().subEnd : Date.now();
                
                const newEnd = currentEnd + (offer.durationDays * 24 * 60 * 60 * 1000);
                
                await updateDoc(profileRef, {
                    status: 'active',
                    subEnd: newEnd
                });

                window.showToast(`Séquence validée. Module [${offer.name}] activé.`);
            } catch (err) {
                console.error(err);
                handlePermissionError(err);
                window.showToast("Erreur de communication lors de la commande.", "error");
            } finally {
                if(window.appState.activeTab === 'catalog') renderActiveTab();
            }
        };

        // --- INGENIERIE DE DEVIS ---
        window.updateQuoteDOM = () => {
            const state = window.appState.quotes;
            const slaMultiplier = state.sla === 'standard' ? 1 : state.sla === 'priority' ? 1.5 : 2.5;
            const estimatedPrice = Math.floor(((state.nodes * 2.5) + (state.storage * 0.05)) * slaMultiplier);
            
            const displayNodes = document.getElementById('display-nodes');
            const displayStorage = document.getElementById('display-storage');
            const displayPrice = document.getElementById('display-price');

            if(displayNodes) displayNodes.innerText = `${state.nodes} Unités`;
            if(displayStorage) displayStorage.innerText = `${state.storage} GB`;
            if(displayPrice) displayPrice.innerHTML = `${estimatedPrice} <span class="text-lg text-slate-500">€/mois</span>`;
        };

        window.handleQuoteChange = (field, val) => {
            if(field === 'sla') window.appState.quotes.sla = val;
            else window.appState.quotes[field] = parseInt(val);
            window.updateQuoteDOM();
        };

        window.submitQuote = async () => {
            const state = window.appState.quotes;
            const slaMultiplier = state.sla === 'standard' ? 1 : state.sla === 'priority' ? 1.5 : 2.5;
            const estimatedPrice = Math.floor(((state.nodes * 2.5) + (state.storage * 0.05)) * slaMultiplier);
            const btn = document.getElementById('btn-quote-submit');
            if(!btn) return;
            
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="zap" class="animate-pulse inline w-4 h-4 mr-2"></i> Transmission...';
            lucide.createIcons({root: btn});

            try {
                const quoteRef = collection(db, 'artifacts', appId, 'public', 'data', 'quotes');
                await addDoc(quoteRef, {
                    userId: window.appState.user.uid,
                    userEmail: window.appState.user.email,
                    nodes: state.nodes,
                    storage: state.storage,
                    sla: state.sla,
                    estimatedPrice,
                    status: 'pending',
                    date: Date.now()
                });
                
                btn.className = "px-8 py-3 rounded-lg font-bold uppercase tracking-wide transition-all shadow-[0_0_15px_rgba(16,185,129,0.2)] bg-emerald-600 text-white";
                btn.innerText = 'Transmission Réussie ✓';
                
                setTimeout(() => {
                    if(window.appState.activeTab === 'quotes') renderActiveTab();
                }, 3000);
            } catch(e) {
                btn.disabled = false;
                btn.className = "px-8 py-3 rounded-lg font-bold uppercase tracking-wide transition-all shadow-[0_0_15px_rgba(8,145,178,0.2)] bg-cyan-600 hover:bg-cyan-500 text-white";
                btn.innerText = 'Soumettre aux Architectes';
                handlePermissionError(e);
                window.showToast("Erreur lors de la transmission.", "error");
            }
        };

        // --- ARCHIVES TRANSACTIONNELLES ---
        function renderHistoryTab(container) {
            container.innerHTML = `
            <div class="space-y-6 animate-fadeIn">
              <header class="mb-8">
                <h2 class="text-3xl font-bold text-white mb-2 font-mono uppercase tracking-wide">Archives Transactionnelles</h2>
                <p class="text-slate-400">Registre immuable de toutes vos acquisitions et accès.</p>
              </header>
              <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden" id="history-content">
                <div class="p-8 text-center text-slate-500 animate-pulse">Extraction des archives...</div>
              </div>
            </div>`;

            if(unsubHistory) unsubHistory();
            const txRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');
            unsubHistory = onSnapshot(txRef, (snapshot) => {

        // --- CANAL SUPPORT DE TCHAT (CÔTÉ CLIENT) ---
        window.submitChat = async (e) => {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const btn = document.getElementById('chat-btn');
            if(!input || !btn) return;

            const text = input.value.trim();
            if(!text) return;
            
            input.value = '';
            input.disabled = true;
            btn.disabled = true;

            try {
                const msgRef = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
                await addDoc(msgRef, {
                    userId: window.appState.user.uid,
                    userEmail: window.appState.user.email,
                    text: text,
                    sender: 'user',
                    timestamp: Date.now()
                });
            } catch (err) {
                console.error(err);
                handlePermissionError(err);
                window.showToast("Erreur lors de l'envoi du message.", "error");
            } finally {
                input.disabled = false;
                btn.disabled = false;
                input.focus();
            }
        };

        function renderChatTab(container) {
            container.innerHTML = `
            <div class="flex flex-col h-[calc(100vh-8rem)] animate-fadeIn">
              <header class="mb-6 shrink-0">

              </header>

              <div id="chat-messages" class="flex-1 bg-slate-900 border border-slate-800 rounded-t-xl overflow-y-auto p-6 space-y-4">
                 <div class="text-center text-slate-500 italic mt-10">Initialisation du protocole...</div>
              </div>

              <form onsubmit="window.submitChat(event)" class="shrink-0 p-4 bg-slate-950 border border-t-0 border-slate-800 rounded-b-xl flex gap-3">
                <input id="chat-input" type="text" placeholder="Entrez votre commande ou message..." autocomplete="off"
                  class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-500 transition-colors font-mono text-sm" />
                <button id="chat-btn" type="submit"
                  class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-3 rounded-lg flex items-center justify-center transition-colors">
                  <i data-lucide="send" class="w-5 h-5"></i>
                </button>
              </form>
            </div>`;

            if(unsubChat) unsubChat();
            const msgRef = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
            unsubChat = onSnapshot(msgRef, (snapshot) => {
                const allMsgs = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
                const msgs = allMsgs.filter(m => m.userId === window.appState.user.uid);

                const snap = await getDoc(clientRef);
                if (snap.exists()) {
                    const currentEnd = snap.data().subEnd || Date.now();

                    await updateDoc(clientRef, {
                        status: 'active',
                        subEnd: newEnd
                    });

                handlePermissionError(e);
                window.showToast("Erreur modification", "error");

            try {
                const clientRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', clientId);
                const nextStatus = currentStatus === 'active' ? 'inactive' : 'active';
                const subEnd = nextStatus === 'active' ? Date.now() + (7 * 24 * 60 * 60 * 1000) : null;
                
                await updateDoc(clientRef, {
                    status: nextStatus,
                    subEnd: subEnd
                });
                window.showToast(`Statut client modifié en: ${nextStatus}`);
