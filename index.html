<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sésame Ouvre-Toi - Dark Cyber Dashboard</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Personnalisation de la barre de défilement */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #020617; /* slate-950 */
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b; /* slate-800 */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #0891b2; /* cyan-600 */
        }
        
        /* Animations pour les notifications (Toast) */
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-animate {
            animation: slideInUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 font-sans overflow-hidden h-screen w-full" id="app">
    
    <!-- Conteneur Principal -->
    <div id="root" class="w-full h-full"></div>

    <!-- Conteneur de Notifications -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- LOGIQUE APPLICATIVE (JavaScript Module) -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, addDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // ==========================================
        // 1. CONFIGURATION FIREBASE (Vos identifiants)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBs4p7kaG0d6GMuMRiThl1W7_ZTncLCBCo",
            authDomain: "sesameouvretoi-13.firebaseapp.com",
            projectId: "sesameouvretoi-13",
            storageBucket: "sesameouvretoi-13.firebasestorage.app",
            messagingSenderId: "167364948430",
            appId: "1:167364948430:web:e1874c21b6d39fd412bb9f",
            measurementId: "G-VRWJPSC723"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "sesameouvretoi";

        // ==========================================
        // 2. DONNÉES STATIQUES
        // ==========================================
        const CATALOG_OFFERS = [
            { id: 'cyber-basic', name: 'Noyau Cyber Basic', price: 9.99, durationDays: 30, color: 'text-blue-400', border: 'border-blue-500/30', features: ['Accès Standard', 'Bande Passante 500GB', 'Support 48h'] },
            { id: 'matrix-pro', name: 'Matrice Pro', price: 29.99, durationDays: 30, color: 'text-cyan-400', border: 'border-cyan-500', popular: true, features: ['Accès Prioritaire', 'Bande Passante Illimitée', 'Support 2h', 'Clé API Sécurisée'] },
            { id: 'overload-max', name: 'Surcharge Éternelle', price: 299.99, durationDays: 365, color: 'text-purple-400', border: 'border-purple-500/50', features: ['Accès Permanent (1 an)', 'Ressources Quantiques', 'Ligne Directe Admin', 'SLA 99.99%'] },
        ];

        const TABS = [
            { id: 'dashboard', label: 'Télémétrie', icon: 'activity' },
            { id: 'catalog', label: 'Modules', icon: 'shopping-cart' },
            { id: 'quotes', label: 'Devis Sur-Mesure', icon: 'database' },
            { id: 'history', label: 'Archives', icon: 'history' },
            { id: 'chat', label: 'Canal Support', icon: 'message-square' },
            { id: 'simulator', label: 'Simulateur Temps', icon: 'clock' },
        ];

        // ==========================================
        // 3. GESTION D'ÉTAT GLOBAL
        // ==========================================
        window.appState = {
            user: null,
            loadingAuth: true,
            isLoginMode: true,
            authLoading: false,
            authError: '',
            activeTab: 'dashboard',
            profile: null,
            catalogFilter: 'all',
            quotes: { nodes: 10, storage: 500, sla: 'standard' }
        };

        let unsubProfile = null;
        let unsubHistory = null;
        let unsubChat = null;

        // Fonction de Notification Toast
        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-red-950 border-red-500/50 text-red-200' : 'bg-cyan-950 border-cyan-500/50 text-cyan-200';
            toast.className = `toast-animate px-4 py-3 rounded-lg shadow-[0_0_15px_rgba(0,0,0,0.5)] border font-mono text-xs uppercase tracking-wide flex items-center gap-2 ${bgColor}`;
            toast.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'check-circle'}" class="w-4 h-4"></i> ${msg}`;
            
            container.appendChild(toast);
            lucide.createIcons({ root: toast });
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        };

        // ==========================================
        // 4. INITIALISATION & LISTENERS
        // ==========================================
        onAuthStateChanged(auth, async (currentUser) => {
            window.appState.user = currentUser;
            
            if (currentUser) {
                const profileRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'userData', 'profile');
                const snap = await getDoc(profileRef);
                
                if (!snap.exists()) {
                    await setDoc(profileRef, {
                        email: currentUser.email,
                        status: 'inactive',
                        subEnd: null,
                        usageTotal: 0,
                        createdAt: Date.now()
                    });
                }

                // Écouteur en temps réel sur le profil
                if(unsubProfile) unsubProfile();
                unsubProfile = onSnapshot(profileRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.subEnd && data.subEnd < Date.now() && data.status === 'active') {
                            updateDoc(profileRef, { status: 'expired' });
                        } else {
                            window.appState.profile = data;
                            if(['dashboard', 'simulator'].includes(window.appState.activeTab)) renderActiveTab();
                        }
                    }
                });
            } else {
                if(unsubProfile) unsubProfile();
                window.appState.profile = null;
            }
            
            window.appState.loadingAuth = false;
            renderApp();
        });

        // ==========================================
        // 5. RENDU DE L'INTERFACE UI
        // ==========================================
        function renderApp() {
            const root = document.getElementById('root');
            if(!root) return;
            
            if (window.appState.loadingAuth) {
                root.innerHTML = `<div class="min-h-screen flex items-center justify-center text-cyan-500"><i data-lucide="zap" class="animate-pulse w-12 h-12"></i></div>`;
            } else if (!window.appState.user) {
                root.innerHTML = getAuthScreenHTML();
            } else {
                root.innerHTML = getMainDashboardHTML();
                renderActiveTab();
            }
            lucide.createIcons();
        }

        // --- AUTHENTIFICATION ---
        window.toggleAuthMode = () => {
            window.appState.isLoginMode = !window.appState.isLoginMode;
            window.appState.authError = '';
            renderApp();
        };

        window.submitAuth = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            
            window.appState.authLoading = true;
            window.appState.authError = '';
            renderApp();

            try {
                if (window.appState.isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
            } catch (err) {
                window.appState.authError = err.message.replace('Firebase: ', '');
                window.appState.authLoading = false;
                renderApp();
            }
        };

        function getAuthScreenHTML() {
            const { isLoginMode, authLoading, authError } = window.appState;
            return `
            <div class="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-4 font-mono relative">
              <div class="absolute inset-0 overflow-hidden pointer-events-none">
                <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-cyan-900/20 blur-[100px] rounded-full"></div>
                <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-900/20 blur-[100px] rounded-full"></div>
              </div>
              
              <div class="z-10 w-full max-w-md bg-slate-900/80 backdrop-blur-xl p-8 rounded-2xl border border-slate-800 shadow-[0_0_30px_rgba(8,145,178,0.15)] relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent"></div>
                
                <div class="flex justify-center mb-8">
                  <div class="p-3 bg-slate-950 rounded-xl border border-cyan-500/30 shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                    <i data-lucide="shield" class="w-10 h-10 text-cyan-400"></i>
                  </div>
                </div>
                
                <h2 class="text-2xl font-bold text-center text-white mb-2 uppercase tracking-widest">Sésame Ouvre-Toi</h2>
                <p class="text-slate-400 text-center mb-8 text-sm">Portail d'Accès Sécurisé</p>
                
                ${authError ? `<div class="mb-4 p-3 bg-red-950/50 border border-red-500/50 rounded text-red-400 text-sm">${authError}</div>` : ''}
                
                <form onsubmit="window.submitAuth(event)" class="space-y-4">
                  <div>
                    <label class="block text-slate-400 text-xs mb-1 uppercase">Identifiant réseau</label>
                    <input id="auth-email" type="email" required
                      class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all"
                      placeholder="agent@matrix.net" />
                  </div>
                  <div>
                    <label class="block text-slate-400 text-xs mb-1 uppercase">Code d'autorisation</label>
                    <input id="auth-password" type="password" required
                      class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all"
                      placeholder="••••••••" />
                  </div>
                  
                  <button type="submit" ${authLoading ? 'disabled' : ''}
                    class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 px-4 rounded-lg shadow-[0_0_15px_rgba(8,145,178,0.5)] transition-all uppercase tracking-wider text-sm mt-4 disabled:opacity-50">
                    ${authLoading ? 'Connexion en cours...' : (isLoginMode ? 'Initialiser la liaison' : 'Créer une instance')}
                  </button>
                </form>
                
                <div class="mt-6 text-center">
                  <button type="button" onclick="window.toggleAuthMode()" class="text-cyan-500/70 hover:text-cyan-400 text-xs transition-colors">
                    ${isLoginMode ? "Demander une nouvelle accréditation ?" : "Déjà accrédité ? Établir la connexion."}
                  </button>
                </div>
              </div>
            </div>`;
        }

        // --- EN-TÊTE ET NAVIGATION DU DASHBOARD ---
        window.handleLogout = () => signOut(auth);
        window.setActiveTab = (tabId) => {
            window.appState.activeTab = tabId;
            // Nettoyage des abonnements temps réel obsolètes
            if(unsubHistory && tabId !== 'history') { unsubHistory(); unsubHistory = null; }
            if(unsubChat && tabId !== 'chat') { unsubChat(); unsubChat = null; }
            
            renderApp();
        };

        function getMainDashboardHTML() {
            const { user, activeTab } = window.appState;
            
            let tabsHTML = TABS.map(tab => `
                <button onclick="window.setActiveTab('${tab.id}')"
                  class="w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all text-sm font-medium ${
                    activeTab === tab.id 
                      ? 'bg-cyan-900/30 text-cyan-300 border border-cyan-500/30 shadow-[inset_0_0_15px_rgba(6,182,212,0.1)]' 
                      : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800/50'
                  }">
                  <i data-lucide="${tab.icon}" class="w-4 h-4 ${activeTab === tab.id ? 'text-cyan-400' : ''}"></i>
                  ${tab.label}
                  ${activeTab === tab.id ? '<i data-lucide="chevron-right" class="w-4 h-4 ml-auto opacity-50"></i>' : ''}
                </button>
            `).join('');

            return `
            <div class="flex h-screen bg-slate-950 text-slate-300 font-sans overflow-hidden w-full">
              <!-- Sidebar Latérale -->
              <div class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col z-20 shrink-0">
                <div class="p-6 border-b border-slate-800 flex items-center gap-3">
                  <div class="p-2 bg-slate-950 rounded border border-cyan-500/50 shadow-[0_0_10px_rgba(6,182,212,0.3)] text-cyan-400">
                    <i data-lucide="terminal" class="w-5 h-5"></i>
                  </div>
                  <div>
                    <h1 class="text-sm font-bold text-white tracking-widest uppercase">Sésame</h1>
                    <p class="text-[10px] text-cyan-500">v2.5 // Connecté</p>
                  </div>
                </div>
                
                <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                  ${tabsHTML}
                </nav>
                
                <div class="p-4 border-t border-slate-800">
                  <div class="flex items-center gap-3 px-4 py-3 bg-slate-950 rounded-lg border border-slate-800 mb-4 overflow-hidden">
                    <i data-lucide="user" class="w-4 h-4 text-slate-500 shrink-0"></i>
                    <div class="text-xs truncate text-slate-400">${user.email}</div>
                  </div>
                  <button onclick="window.handleLogout()" class="w-full flex items-center justify-center gap-2 px-4 py-2 text-sm text-red-400/80 hover:text-red-400 hover:bg-red-950/30 rounded-lg transition-colors border border-transparent hover:border-red-900/50">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Déconnexion
                  </button>
                </div>
              </div>

              <!-- Zone de Contenu Principale -->
              <div class="flex-1 relative overflow-y-auto overflow-x-hidden">
                <div class="absolute inset-0 pointer-events-none bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-cyan-900/10 via-slate-950 to-slate-950 z-0"></div>
                <div class="relative z-10 p-8 max-w-6xl mx-auto w-full" id="tab-content">
                    <!-- Contenu injecté dynamiquement -->
                </div>
              </div>
            </div>`;
        }

        function renderActiveTab() {
            const container = document.getElementById('tab-content');
            if(!container) return;

            const { activeTab } = window.appState;
            
            if (activeTab === 'dashboard') renderDashboardTab(container);
            else if (activeTab === 'catalog') renderCatalogTab(container);
            else if (activeTab === 'quotes') renderQuotesTab(container);
            else if (activeTab === 'history') renderHistoryTab(container);
            else if (activeTab === 'chat') renderChatTab(container);
            else if (activeTab === 'simulator') renderSimulatorTab(container);

            lucide.createIcons({ root: container });
        }

        // ==========================================
        // 6. MODULES INDIVIDUELS DE RENDU
        // ==========================================

        // --- DASHBOARD (TÉLÉMÉTRIE) ---
        function renderDashboardTab(container) {
            const profile = window.appState.profile;
            if (!profile) {
                container.innerHTML = `<div class="animate-pulse text-cyan-500">Synchronisation des télémétries...</div>`;
                return;
            }

            const isActive = profile.status === 'active' && profile.subEnd > Date.now();
            const daysRemaining = profile.subEnd ? Math.max(0, Math.ceil((profile.subEnd - Date.now()) / (1000 * 60 * 60 * 24))) : 0;
            const progressWidth = Math.min(100, (daysRemaining / 30) * 100);

            container.innerHTML = `
            <div class="space-y-6 animate-fadeIn">
              <header class="mb-8">
                <h2 class="text-3xl font-bold text-white mb-2 font-mono uppercase tracking-wide">Télémétrie Système</h2>
                <p class="text-slate-400">Analyse en temps réel de votre accès au réseau Sésame.</p>
              </header>

              <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- État -->
                <div class="bg-slate-900/80 border border-slate-800 rounded-xl p-6 relative overflow-hidden group hover:border-slate-700 transition-colors">
                  <div class="absolute top-0 right-0 w-24 h-24 blur-[50px] rounded-full ${isActive ? 'bg-cyan-500/20' : 'bg-red-500/20'}"></div>
                  <div class="flex items-center gap-4 mb-4">
                    <div class="p-3 rounded-lg ${isActive ? 'bg-cyan-950 text-cyan-400 border border-cyan-500/30' : 'bg-red-950 text-red-400 border border-red-500/30'}">
                      <i data-lucide="${isActive ? 'check-circle' : 'alert-circle'}" class="w-6 h-6"></i>
                    </div>
                    <div>
                      <div class="text-slate-400 text-xs uppercase tracking-wider">État de la connexion</div>
                      <div class="text-xl font-bold uppercase ${isActive ? 'text-cyan-400' : 'text-red-400'}">
                        ${isActive ? 'Liaison Active' : 'Liaison Interrompue'}
                      </div>
                    </div>
                  </div>
                  <p class="text-sm text-slate-400">
                    ${isActive ? 'Tous les sous-systèmes fonctionnent de manière optimale. Autorisations accordées.' : 'Accès réseau révoqué. Veuillez renouveler votre module pour rétablir la liaison.'}
                  </p>
                </div>

                <!-- Énergie Temporelle -->
                <div class="bg-slate-900/80 border border-slate-800 rounded-xl p-6 relative overflow-hidden group hover:border-slate-700 transition-colors">
                   <div class="absolute top-0 right-0 w-24 h-24 bg-purple-500/10 blur-[50px] rounded-full"></div>
                   <div class="flex items-center gap-4 mb-4">
                    <div class="p-3 bg-slate-950 rounded-lg text-purple-400 border border-purple-500/30">
                      <i data-lucide="clock" class="w-6 h-6"></i>
                    </div>
                    <div>
                      <div class="text-slate-400 text-xs uppercase tracking-wider">Énergie Temporelle</div>
                      <div class="text-2xl font-bold text-white">${daysRemaining} <span class="text-sm text-slate-500 font-normal">jours</span></div>
                    </div>
                  </div>
                  <div class="w-full bg-slate-950 rounded-full h-1.5 mt-4">
                    <div class="bg-purple-500 h-1.5 rounded-full" style="width: ${progressWidth}%"></div>
                  </div>
                </div>

                <!-- Cycles d'utilisation -->
                <div class="bg-slate-900/80 border border-slate-800 rounded-xl p-6 relative overflow-hidden group hover:border-slate-700 transition-colors">
                   <div class="absolute top-0 right-0 w-24 h-24 bg-emerald-500/10 blur-[50px] rounded-full"></div>
                   <div class="flex items-center gap-4 mb-4">
                    <div class="p-3 bg-slate-950 rounded-lg text-emerald-400 border border-emerald-500/30">
                      <i data-lucide="cpu" class="w-6 h-6"></i>
                    </div>
                    <div>
                      <div class="text-slate-400 text-xs uppercase tracking-wider">Requêtes Serveur</div>
                      <div class="text-2xl font-bold text-white">${profile.usageTotal} <span class="text-sm text-slate-500 font-normal">cycles</span></div>
                    </div>
                  </div>
                  <p class="text-xs text-slate-500 mt-2">Mesure asynchrone des requêtes transmises au noyau central Sésame.</p>
                </div>
              </div>
            </div>`;
        }

        // --- CATALOGUE DE MODULES ---
        window.setCatalogFilter = (filter) => {
            window.appState.catalogFilter = filter;
            renderActiveTab();
        };

        window.handleSubscribe = async (offerId) => {
            const offer = CATALOG_OFFERS.find(o => o.id === offerId);
            if(!offer) return;
            
            const btn = document.getElementById(`btn-${offer.id}`);
            if(btn) {
                btn.disabled = true;
                btn.innerHTML = '<i data-lucide="zap" class="w-4 h-4 animate-pulse inline mr-2"></i> Traitement...';
                lucide.createIcons({ root: btn });
            }
            
            try {
                // Créer transaction
                const txRef = collection(db, 'artifacts', appId, 'users', window.appState.user.uid, 'transactions');
                await addDoc(txRef, {
                    type: 'subscription',
                    offerId: offer.id,
                    offerName: offer.name,
                    price: offer.price,
                    date: Date.now(),
                    status: 'completed'
                });

                // Mettre à jour profil
                const profileRef = doc(db, 'artifacts', appId, 'users', window.appState.user.uid, 'userData', 'profile');
                const docSnap = await getDoc(profileRef);
                let currentEnd = docSnap.exists() && docSnap.data().subEnd && docSnap.data().subEnd > Date.now() 
                                 ? docSnap.data().subEnd : Date.now();
                
                const newEnd = currentEnd + (offer.durationDays * 24 * 60 * 60 * 1000);
                
                await updateDoc(profileRef, {
                    status: 'active',
                    subEnd: newEnd
                });

                window.showToast(`Séquence validée. Module [${offer.name}] activé.`);
            } catch (err) {
                console.error(err);
                window.showToast("Erreur de communication lors de la commande.", "error");
            } finally {
                if(window.appState.activeTab === 'catalog') renderActiveTab();
            }
        };

        function renderCatalogTab(container) {
            const filter = window.appState.catalogFilter;
            const filteredOffers = CATALOG_OFFERS.filter(o => {
                if (filter === 'monthly') return o.durationDays === 30;
                if (filter === 'yearly') return o.durationDays >= 365;
                return true;
            });

            let offersHTML = filteredOffers.map(offer => `
                <div class="relative flex flex-col bg-slate-900/50 backdrop-blur-md rounded-2xl border ${offer.border} p-6 overflow-hidden transition-all hover:scale-[1.02] hover:bg-slate-900/80">
                  ${offer.popular ? `<div class="absolute top-0 right-0 bg-cyan-600 text-white text-[10px] uppercase font-bold px-3 py-1 rounded-bl-lg">Recommandé</div>` : ''}
                  
                  <h3 class="text-xl font-bold ${offer.color} font-mono mb-2 uppercase">${offer.name}</h3>
                  <div class="flex items-baseline gap-1 mb-6">
                    <span class="text-3xl font-bold text-white">${offer.price}€</span>
                    <span class="text-slate-500 text-sm">/ ${offer.durationDays}j</span>
                  </div>

                  <ul class="space-y-3 mb-8 flex-1">
                    ${offer.features.map(feat => `
                      <li class="flex items-start gap-2 text-sm text-slate-300">
                        <i data-lucide="chevron-right" class="w-4 h-4 mt-0.5 ${offer.color}"></i>
                        ${feat}
                      </li>
                    `).join('')}
                  </ul>

                  <button id="btn-${offer.id}" onclick="window.handleSubscribe('${offer.id}')"
                    class="w-full py-3 rounded-lg font-bold text-sm uppercase tracking-wider transition-all border ${
                      offer.popular 
                        ? 'bg-cyan-600 border-cyan-500 text-white shadow-[0_0_15px_rgba(8,145,178,0.4)] hover:bg-cyan-500' 
                        : 'bg-slate-950 border-slate-700 text-slate-300 hover:border-slate-500 hover:bg-slate-800'
                    }">
                    Initialiser Séquence
                  </button>
                </div>
            `).join('');

            container.innerHTML = `
            <div class="space-y-6 animate-fadeIn">
              <header class="mb-8 flex justify-between items-end flex-wrap gap-4">
                <div>
                  <h2 class="text-3xl font-bold text-white mb-2 font-mono uppercase tracking-wide">Modules d'Extension</h2>
                  <p class="text-slate-400">Acquérez de nouvelles capacités et réactivez votre liaison.</p>
                </div>
                <div class="flex bg-slate-900 border border-slate-800 rounded-lg p-1">
                  <button onclick="window.setCatalogFilter('all')" class="px-4 py-1.5 text-xs uppercase font-bold rounded ${filter === 'all' ? 'bg-slate-800 text-white' : 'text-slate-500'}">Tous</button>
                  <button onclick="window.setCatalogFilter('monthly')" class="px-4 py-1.5 text-xs uppercase font-bold rounded ${filter === 'monthly' ? 'bg-slate-800 text-white' : 'text-slate-500'}">Mensuel</button>
                  <button onclick="window.setCatalogFilter('yearly')" class="px-4 py-1.5 text-xs uppercase font-bold rounded ${filter === 'yearly' ? 'bg-slate-800 text-white' : 'text-slate-500'}">Annuel</button>
                </div>
              </header>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                ${offersHTML}
              </div>
            </div>`;
        }

        // --- INGENIERIE DE DEVIS ---
        window.updateQuoteDOM = () => {
            const state = window.appState.quotes;
            const slaMultiplier = state.sla === 'standard' ? 1 : state.sla === 'priority' ? 1.5 : 2.5;
            const estimatedPrice = Math.floor(((state.nodes * 2.5) + (state.storage * 0.05)) * slaMultiplier);
            
            const displayNodes = document.getElementById('display-nodes');
            const displayStorage = document.getElementById('display-storage');
            const displayPrice = document.getElementById('display-price');

            if(displayNodes) displayNodes.innerText = `${state.nodes} Unités`;
            if(displayStorage) displayStorage.innerText = `${state.storage} GB`;
            if(displayPrice) displayPrice.innerHTML = `${estimatedPrice} <span class="text-lg text-slate-500">€/mois</span>`;
        };

        window.handleQuoteChange = (field, val) => {
            if(field === 'sla') window.appState.quotes.sla = val;
            else window.appState.quotes[field] = parseInt(val);
            window.updateQuoteDOM();
        };

        window.submitQuote = async () => {
            const state = window.appState.quotes;
            const slaMultiplier = state.sla === 'standard' ? 1 : state.sla === 'priority' ? 1.5 : 2.5;
            const estimatedPrice = Math.floor(((state.nodes * 2.5) + (state.storage * 0.05)) * slaMultiplier);
            const btn = document.getElementById('btn-quote-submit');
            if(!btn) return;
            
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="zap" class="animate-pulse inline w-4 h-4 mr-2"></i> Transmission...';
            lucide.createIcons({root: btn});

            try {
                const quoteRef = collection(db, 'artifacts', appId, 'users', window.appState.user.uid, 'quotes');
                await addDoc(quoteRef, {
                    nodes: state.nodes,
                    storage: state.storage,
                    sla: state.sla,
                    estimatedPrice,
                    status: 'pending',
                    date: Date.now()
                });
                
                btn.className = "px-8 py-3 rounded-lg font-bold uppercase tracking-wide transition-all shadow-[0_0_15px_rgba(16,185,129,0.2)] bg-emerald-600 text-white";
                btn.innerText = 'Transmission Réussie ✓';
                
                setTimeout(() => {
                    if(window.appState.activeTab === 'quotes') renderActiveTab();
                }, 3000);
            } catch(e) {
                btn.disabled = false;
                btn.className = "px-8 py-3 rounded-lg font-bold uppercase tracking-wide transition-all shadow-[0_0_15px_rgba(8,145,178,0.2)] bg-cyan-600 hover:bg-cyan-500 text-white";
                btn.innerText = 'Soumettre aux Architectes';
                window.showToast("Erreur lors de la transmission.", "error");
            }
        };

        function renderQuotesTab(container) {
            const state = window.appState.quotes;
            const slaMultiplier = state.sla === 'standard' ? 1 : state.sla === 'priority' ? 1.5 : 2.5;
            const estimatedPrice = Math.floor(((state.nodes * 2.5) + (state.storage * 0.05)) * slaMultiplier);

            container.innerHTML = `
            <div class="space-y-6 max-w-3xl animate-fadeIn">
              <header class="mb-8">
                <h2 class="text-3xl font-bold text-white mb-2 font-mono uppercase tracking-wide">Ingénierie Sur-Mesure</h2>
                <p class="text-slate-400">Générez une estimation dynamique pour une architecture personnalisée de votre réseau Sésame.</p>
              </header>

              <div class="bg-slate-900 border border-slate-800 rounded-xl p-8 shadow-xl">
                <div class="space-y-8">
                  <div>
                    <div class="flex justify-between mb-2">
                      <label class="text-sm font-bold text-slate-300 uppercase">Noeuds de calcul quantique</label>
                      <span id="display-nodes" class="text-cyan-400 font-mono">${state.nodes} Unités</span>
                    </div>
                    <input type="range" min="1" max="100" value="${state.nodes}" oninput="window.handleQuoteChange('nodes', this.value)"
                      class="w-full h-2 bg-slate-950 rounded-lg appearance-none cursor-pointer accent-cyan-500" />
                  </div>

                  <div>
                    <div class="flex justify-between mb-2">
                      <label class="text-sm font-bold text-slate-300 uppercase">Stockage de données sécurisé</label>
                      <span id="display-storage" class="text-purple-400 font-mono">${state.storage} GB</span>
                    </div>
                    <input type="range" min="50" max="5000" step="50" value="${state.storage}" oninput="window.handleQuoteChange('storage', this.value)"
                      class="w-full h-2 bg-slate-950 rounded-lg appearance-none cursor-pointer accent-purple-500" />
                  </div>

                  <div>
                    <label class="block text-sm font-bold text-slate-300 uppercase mb-2">Niveau de protocole d'assistance (SLA)</label>
                    <select onchange="window.handleQuoteChange('sla', this.value)"
                      class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-500">
                      <option value="standard" ${state.sla === 'standard' ? 'selected' : ''}>Standard (Intervention sous 48h)</option>
                      <option value="priority" ${state.sla === 'priority' ? 'selected' : ''}>Prioritaire (Intervention sous 4h)</option>
                      <option value="mission_critical" ${state.sla === 'mission_critical' ? 'selected' : ''}>Mission Critique (Direct Admin 24/7)</option>
                    </select>
                  </div>
                </div>

                <div class="mt-10 p-6 bg-slate-950 rounded-xl border border-cyan-900/50 flex flex-col sm:flex-row items-center justify-between gap-6">
                  <div>
                    <div class="text-slate-400 text-xs uppercase tracking-wider mb-1">Estimation Mensuelle Dynamique</div>
                    <div id="display-price" class="text-4xl font-bold text-white font-mono">${estimatedPrice} <span class="text-lg text-slate-500">€/mois</span></div>
                  </div>
                  
                  <button id="btn-quote-submit" onclick="window.submitQuote()"
                    class="px-8 py-3 rounded-lg font-bold uppercase tracking-wide transition-all shadow-[0_0_15px_rgba(8,145,178,0.2)] bg-cyan-600 hover:bg-cyan-500 text-white">
                    Soumettre aux Architectes
                  </button>
                </div>
              </div>
            </div>`;
        }

        // --- ARCHIVES TRANSACTIONNELLES ---
        function renderHistoryTab(container) {
            container.innerHTML = `
            <div class="space-y-6 animate-fadeIn">
              <header class="mb-8">
                <h2 class="text-3xl font-bold text-white mb-2 font-mono uppercase tracking-wide">Archives Transactionnelles</h2>
                <p class="text-slate-400">Registre immuable de toutes vos acquisitions et accès.</p>
              </header>
              <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden" id="history-content">
                <div class="p-8 text-center text-slate-500 animate-pulse">Extraction des archives...</div>
              </div>
            </div>`;

            if(unsubHistory) unsubHistory();
            const txRef = collection(db, 'artifacts', appId, 'users', window.appState.user.uid, 'transactions');
            unsubHistory = onSnapshot(txRef, (snapshot) => {
                const txs = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
                txs.sort((a, b) => b.date - a.date); // Tri en mémoire (Règle 2)
                
                const tableCont = document.getElementById('history-content');
                if(!tableCont) return;

                if (txs.length === 0) {
                    tableCont.innerHTML = `<div class="p-8 text-center text-slate-500">Aucune donnée trouvée dans la base de registres.</div>`;
                } else {
                    tableCont.innerHTML = `
                    <div class="overflow-x-auto w-full">
                        <table class="w-full text-left border-collapse min-w-[600px]">
                            <thead>
                              <tr class="bg-slate-950 border-b border-slate-800">
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">ID Trace</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Horodatage</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Module</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Valeur</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Statut</th>
                              </tr>
                            </thead>
                            <tbody>
                              ${txs.map(tx => `
                                <tr class="border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                  <td class="p-4 text-xs font-mono text-slate-500">${tx.id.substring(0, 8)}</td>
                                  <td class="p-4 text-sm text-slate-300">${new Date(tx.date).toLocaleString()}</td>
                                  <td class="p-4 text-sm font-medium text-cyan-400">${tx.offerName || 'Inconnu'}</td>
                                  <td class="p-4 text-sm text-slate-300">${tx.price ? `${tx.price}€` : '-'}</td>
                                  <td class="p-4">
                                    <span class="px-2 py-1 bg-emerald-950/40 text-emerald-400 border border-emerald-500/30 rounded text-xs uppercase">Confirmé</span>
                                  </td>
                                </tr>
                              `).join('')}
                            </tbody>
                        </table>
                    </div>`;
                }
            });
        }

        // --- CANAL SUPPORT DE TCHAT ---
        window.submitChat = async (e) => {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const btn = document.getElementById('chat-btn');
            if(!input || !btn) return;

            const text = input.value.trim();
            if(!text) return;
            
            input.value = '';
            input.disabled = true;
            btn.disabled = true;

            try {
                const msgRef = collection(db, 'artifacts', appId, 'users', window.appState.user.uid, 'messages');
                await addDoc(msgRef, {
                    text: text,
                    sender: 'user',
                    timestamp: Date.now()
                });

                // Réponse automatique simulée d'un administrateur (asynchrone)
                setTimeout(async () => {
                    await addDoc(msgRef, {
                        text: `[Système] Requête transmise avec succès. Un opérateur du protocole de support traitera votre demande "${text.substring(0, 15)}..." sous peu.`,
                        sender: 'admin',
                        timestamp: Date.now()
                    });
                }, 1500);
            } catch (err) {
                console.error(err);
                window.showToast("Erreur lors de l'envoi du message.", "error");
            } finally {
                input.disabled = false;
                btn.disabled = false;
                input.focus();
            }
        };

        function renderChatTab(container) {
            container.innerHTML = `
            <div class="flex flex-col h-[calc(100vh-8rem)] animate-fadeIn">
              <header class="mb-6 shrink-0">
                <h2 class="text-3xl font-bold text-white mb-2 font-mono uppercase tracking-wide">Canal Sécurisé bidirectionnel</h2>
                <p class="text-slate-400">Échange direct crypté avec les administrateurs du réseau Sésame.</p>
              </header>

              <div id="chat-messages" class="flex-1 bg-slate-900 border border-slate-800 rounded-t-xl overflow-y-auto p-6 space-y-4">
                 <div class="text-center text-slate-500 italic mt-10">Initialisation du protocole...</div>
              </div>

              <form onsubmit="window.submitChat(event)" class="shrink-0 p-4 bg-slate-950 border border-t-0 border-slate-800 rounded-b-xl flex gap-3">
                <input id="chat-input" type="text" placeholder="Entrez votre commande ou message..." autocomplete="off"
                  class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-500 transition-colors font-mono text-sm" />
                <button id="chat-btn" type="submit"
                  class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-3 rounded-lg flex items-center justify-center transition-colors">
                  <i data-lucide="send" class="w-5 h-5"></i>
                </button>
              </form>
            </div>`;

            if(unsubChat) unsubChat();
            const msgRef = collection(db, 'artifacts', appId, 'users', window.appState.user.uid, 'messages');
            unsubChat = onSnapshot(msgRef, (snapshot) => {
                const msgs = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
                msgs.sort((a, b) => a.timestamp - b.timestamp);
                
                const chatBox = document.getElementById('chat-messages');
                if(!chatBox) return;

                if(msgs.length === 0) {
                    chatBox.innerHTML = `<div class="text-center text-slate-500 italic mt-10">Protocole de communication prêt. En attente de transmission...</div>`;
                } else {
                    chatBox.innerHTML = msgs.map(msg => `
                        <div class="flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}">
                          <div class="max-w-[70%] p-4 rounded-2xl ${msg.sender === 'user' ? 'bg-cyan-900/40 text-cyan-50 border border-cyan-500/30 rounded-br-sm' : 'bg-slate-950 text-slate-300 border border-slate-700 rounded-bl-sm'}">
                            ${msg.sender === 'admin' ? '<div class="text-[10px] text-purple-400 uppercase mb-1 font-bold">Admin Sésame</div>' : ''}
                            <div class="text-sm break-words">${msg.text}</div>
                          </div>
                        </div>
                    `).join('');
                    // Scroll automatique vers le bas
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            });
        }

        // --- SIMULATEUR TEMPOREL ---
        window.handleTimeTravel = async () => {
            const btn1 = document.getElementById('btn-sim-1');
            const btn2 = document.getElementById('btn-sim-2');
            if(btn1) btn1.disabled = true; 
            if(btn2) btn2.disabled = true;

            try {
                const profileRef = doc(db, 'artifacts', appId, 'users', window.appState.user.uid, 'userData', 'profile');
                const docSnap = await getDoc(profileRef);
                if (docSnap.exists() && docSnap.data().subEnd) {
                    // Recule la date de fin en DB de 31 jours pour tester l'expiration
                    const newEnd = docSnap.data().subEnd - (31 * 24 * 60 * 60 * 1000);
                    await updateDoc(profileRef, { subEnd: newEnd });
                    window.showToast("Dissonance temporelle appliquée (-31j en base).");
                } else {
                    window.showToast("Aucun abonnement actif à modifier.", "error");
                }
            } catch (err) {
                console.error(err);
                window.showToast("Erreur lors de la mise à jour temporelle.", "error");
            } finally {
                setTimeout(() => { 
                    if(btn1) btn1.disabled = false; 
                    if(btn2) btn2.disabled = false;
                }, 800);
            }
        };

        window.handleFreeReactivation = async () => {
            const btn1 = document.getElementById('btn-sim-1');
            const btn2 = document.getElementById('btn-sim-2');
            if(btn1) btn1.disabled = true; 
            if(btn2) btn2.disabled = true;

            try {
                const profileRef = doc(db, 'artifacts', appId, 'users', window.appState.user.uid, 'userData', 'profile');
                const docSnap = await getDoc(profileRef);
                let baseDate = Date.now();
                if (docSnap.exists() && docSnap.data().subEnd && docSnap.data().subEnd > Date.now()) {
                    baseDate = docSnap.data().subEnd;
                }
                const newEnd = baseDate + (7 * 24 * 60 * 60 * 1000);
                
                await updateDoc(profileRef, { status: 'active', subEnd: newEnd });
                
                const txRef = collection(db, 'artifacts', appId, 'users', window.appState.user.uid, 'transactions');
                await addDoc(txRef, { type: 'reactivation', offerName: 'Réactivation Secours', price: 0, date: Date.now(), status: 'completed' });
                window.showToast("Injection réussie. Module de secours de 7j déployé.");
            } catch (err) {
                console.error(err);
                window.showToast("Échec de la réactivation.", "error");
            } finally {
                setTimeout(() => { 
                    if(btn1) btn1.disabled = false; 
                    if(btn2) btn2.disabled = false;
                }, 800);
            }
        };

        function renderSimulatorTab(container) {
            const profile = window.appState.profile;
            const currentEnd = profile?.subEnd ? new Date(profile.subEnd).toLocaleString() : 'N/A';

            container.innerHTML = `
            <div class="space-y-6 max-w-3xl animate-fadeIn">
              <header class="mb-8">
                <h2 class="text-3xl font-bold text-white mb-2 font-mono uppercase tracking-wide flex items-center gap-3">
                  <i data-lucide="clock" class="text-yellow-400 w-8 h-8"></i> Simulateur Temporel
                </h2>
                <p class="text-slate-400">Manipulez l'environnement de base de données pour tester les règles métiers asynchrones.</p>
              </header>

              <div class="bg-slate-900 border-2 border-yellow-900/30 rounded-xl p-8 relative overflow-hidden">
                <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTEgMWgydjJIMXoiIGZpbGw9IiMzMzMiIGZpbGwtcnVsZT0iZXZlbm9kZCIvPjwvc3ZnPg==')] opacity-10"></div>
                
                <div class="relative z-10">
                  <div class="mb-8 p-4 bg-slate-950 rounded-lg border border-slate-700 flex justify-between items-center">
                     <span class="text-slate-400 text-sm uppercase">Date d'Expiration Actuelle :</span>
                     <span class="font-mono text-cyan-400 font-bold">${currentEnd}</span>
                  </div>

                  <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <button id="btn-sim-1" onclick="window.handleTimeTravel()" ${!profile?.subEnd ? 'disabled' : ''}
                      class="group p-6 bg-slate-950 border border-red-900/50 hover:border-red-500/50 rounded-xl transition-all disabled:opacity-50 text-left">
                      <div class="flex flex-col items-center gap-3">
                        <i data-lucide="clock" class="w-8 h-8 text-red-500 group-hover:-rotate-90 transition-transform duration-700"></i>
                        <div class="text-center">
                          <div class="font-bold text-red-400 uppercase text-sm mb-1">Avancer le temps (+31j)</div>
                          <div class="text-xs text-slate-500">Provoque l'expiration artificielle de l'abonnement en soustrayant du temps en base Firestore.</div>
                        </div>
                      </div>
                    </button>

                    <button id="btn-sim-2" onclick="window.handleFreeReactivation()"
                      class="group p-6 bg-slate-950 border border-emerald-900/50 hover:border-emerald-500/50 rounded-xl transition-all disabled:opacity-50 text-left">
                      <div class="flex flex-col items-center gap-3">
                        <i data-lucide="shield" class="w-8 h-8 text-emerald-500 group-hover:scale-110 transition-transform"></i>
                        <div class="text-center">
                          <div class="font-bold text-emerald-400 uppercase text-sm mb-1">Réactivation de Secours</div>
                          <div class="text-xs text-slate-500">Restaure gratuitement l'accès réseau pour 7 jours de manière promotionnelle.</div>
                        </div>
                      </div>
                    </button>
                  </div>
                  
                  <p class="mt-8 text-xs text-slate-500 text-center italic">
                    Note: Observez la réaction instantanée du statut et de l'accès réseau sur la page de "Télémétrie" grâce à la synchronisation en temps réel de Firestore.
                  </p>
                </div>
              </div>
            </div>`;
        }

    </script>
</body>
</html>
